<html lang="en">

<title>Library — ASTUBE</title>

<link rel="stylesheet" href="style.css"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>

<style>
/* ── Library Page ── */
.lib-header {
  padding: 72px 16px 0;
  display: flex; align-items: center; justify-content: space-between;
}
.lib-title {
  font-size: 22px; font-weight: 800; letter-spacing: -.5px;
}
.lib-actions { display: flex; gap: 8px; }
.lib-icon-btn {
  width: 36px; height: 36px; border-radius: 50%;
  background: var(--surf2); border: 1px solid var(--border);
  color: var(--text2); display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all .2s; font-size: 14px;
}
.lib-icon-btn:hover { background: var(--surf); color: var(--text); }

/* Empty state */
.lib-empty {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; padding: 60px 32px; text-align: center;
  gap: 16px;
}
.lib-empty-icon {
  width: 80px; height: 80px; border-radius: 50%;
  background: var(--surf2); display: flex; align-items: center;
  justify-content: center; font-size: 32px; color: var(--text3);
  margin-bottom: 4px;
}
.lib-empty h3 { font-size: 18px; font-weight: 700; margin: 0; }
.lib-empty p  { font-size: 13px; color: var(--text2); margin: 0; line-height: 1.6; }
.lib-select-btn {
  margin-top: 8px; padding: 12px 28px; border-radius: 24px;
  background: var(--red); color: #fff; border: none;
  font-size: 14px; font-weight: 800; cursor: pointer;
  display: flex; align-items: center; gap: 8px;
  transition: opacity .2s;
}
.lib-select-btn:hover { opacity: .85; }

/* Folder info bar */
.lib-folder-bar {
  margin: 12px 16px 0;
  padding: 10px 14px; border-radius: 10px;
  background: var(--surf2); border: 1px solid var(--border);
  display: flex; align-items: center; gap: 10px;
  font-size: 12px; color: var(--text2);
}
.lib-folder-bar i { color: var(--red); font-size: 14px; }
.lib-folder-name { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.lib-folder-change {
  background: none; border: none; color: var(--text2);
  font-size: 11px; cursor: pointer; padding: 4px 8px;
  border-radius: 6px; transition: color .2s;
  white-space: nowrap;
}
.lib-folder-change:hover { color: var(--text); }

/* Stats bar */
.lib-stats {
  padding: 8px 16px 4px;
  font-size: 12px; color: var(--text3);
}

/* Video grid */
.lib-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
  padding: 12px 16px calc(var(--nh) + 24px);
}
@media(min-width: 600px) { .lib-grid { grid-template-columns: repeat(3, 1fr); } }
@media(min-width: 900px) { .lib-grid { grid-template-columns: repeat(4, 1fr); } }

/* Video card */
.lib-card {
  border-radius: 10px; overflow: hidden;
  background: var(--surf); cursor: pointer;
  transition: transform .15s, opacity .15s;
  position: relative;
}
.lib-card:active { transform: scale(.97); opacity: .85; }

.lib-thumb-wrap {
  position: relative; aspect-ratio: 16/9;
  background: var(--surf2); overflow: hidden;
}
.lib-thumb {
  width: 100%; height: 100%; object-fit: cover;
  display: block;
}
.lib-thumb-placeholder {
  width: 100%; height: 100%;
  display: flex; align-items: center; justify-content: center;
  background: var(--surf2); color: var(--text3); font-size: 28px;
}
.lib-duration {
  position: absolute; bottom: 6px; right: 6px;
  background: rgba(0,0,0,.85); color: #fff;
  font-size: 11px; font-weight: 700; padding: 2px 6px;
  border-radius: 4px; letter-spacing: .3px;
}
.lib-resume-bar {
  position: absolute; bottom: 0; left: 0; right: 0;
  height: 3px; background: var(--red);
  transform-origin: left; transition: width .3s;
}
.lib-play-overlay {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  background: rgba(0,0,0,0); transition: background .2s;
}
.lib-card:hover .lib-play-overlay { background: rgba(0,0,0,.35); }
.lib-play-icon {
  width: 44px; height: 44px; border-radius: 50%;
  background: rgba(255,255,255,.15); backdrop-filter: blur(4px);
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; color: #fff; opacity: 0; transition: opacity .2s;
  padding-left: 3px;
}
.lib-card:hover .lib-play-icon { opacity: 1; }

.lib-card-info { padding: 8px 10px 10px; }
.lib-card-title {
  font-size: 12px; font-weight: 600; line-height: 1.4;
  color: var(--text); display: -webkit-box;
  -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  overflow: hidden; margin-bottom: 4px;
}
.lib-card-meta {
  font-size: 11px; color: var(--text3);
  display: flex; align-items: center; gap: 6px;
}
.lib-card-meta i { font-size: 10px; }

/* Resume badge */
.lib-resume-badge {
  position: absolute; top: 6px; left: 6px;
  background: var(--red); color: #fff;
  font-size: 9px; font-weight: 800; padding: 2px 6px;
  border-radius: 4px; text-transform: uppercase; letter-spacing: .5px;
}

/* Loading skeleton */
.lib-skeleton {
  border-radius: 10px; overflow: hidden;
  background: var(--surf);
}
.lib-skeleton-thumb {
  aspect-ratio: 16/9;
  background: linear-gradient(90deg, var(--surf2) 25%, var(--surf) 50%, var(--surf2) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.2s infinite;
}
.lib-skeleton-lines { padding: 8px 10px 10px; }
.lib-skeleton-line {
  height: 10px; border-radius: 4px; margin-bottom: 6px;
  background: linear-gradient(90deg, var(--surf2) 25%, var(--surf) 50%, var(--surf2) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.2s infinite;
}
.lib-skeleton-line.short { width: 60%; }
@keyframes shimmer {
  0%   { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}

/* Local player overlay */
#local-player-overlay {
  position: fixed; inset: 0; z-index: 500;
  background: #000;
  display: flex; flex-direction: column;
  transform: translateY(100%);
  transition: transform .3s cubic-bezier(.22,.61,.36,1);
}
#local-player-overlay.open { transform: translateY(0); }

.lp-header {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 16px; background: rgba(0,0,0,.8);
  position: absolute; top: 0; left: 0; right: 0; z-index: 10;
}
.lp-back {
  width: 36px; height: 36px; border-radius: 50%;
  background: rgba(255,255,255,.1); border: none;
  color: #fff; font-size: 16px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.lp-title {
  flex: 1; font-size: 13px; font-weight: 600; color: #fff;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

#local-video {
  width: 100%; height: 100%;
  object-fit: contain; background: #000;
}

.lp-controls {
  position: absolute; bottom: 0; left: 0; right: 0;
  background: linear-gradient(transparent, rgba(0,0,0,.9));
  padding: 32px 16px 16px;
}
.lp-progress-wrap {
  position: relative; height: 20px;
  display: flex; align-items: center; margin-bottom: 8px;
  cursor: pointer;
}
.lp-progress-bg {
  position: absolute; left: 0; right: 0;
  height: 3px; background: rgba(255,255,255,.2);
  border-radius: 3px; overflow: hidden;
}
.lp-progress-fill {
  height: 100%; background: var(--red);
  border-radius: 3px; width: 0%; transition: width .5s linear;
}
.lp-progress-input {
  position: absolute; left: 0; right: 0;
  width: 100%; height: 100%; opacity: 0; cursor: pointer;
  margin: 0;
}
.lp-time-row {
  display: flex; align-items: center; justify-content: space-between;
  color: #fff; font-size: 12px; margin-bottom: 12px;
}
.lp-btn-row {
  display: flex; align-items: center; justify-content: center; gap: 24px;
}
.lp-btn {
  background: none; border: none; color: #fff;
  font-size: 20px; cursor: pointer; padding: 8px;
  opacity: .9; transition: opacity .2s;
}
.lp-btn:hover { opacity: 1; }
.lp-btn.play-btn { font-size: 28px; }

/* Scan progress */
#scan-progress {
  margin: 8px 16px 0;
  padding: 10px 14px; border-radius: 10px;
  background: var(--surf2); border: 1px solid var(--border);
  font-size: 12px; color: var(--text2);
  display: none; align-items: center; gap: 10px;
}
#scan-progress i { color: var(--red); animation: spin .8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>

<script src="app.js"></script>
<script>
// ================================================================
// ASTUBE Library — Local Video Manager
// ================================================================

const DB_NAME    = 'astube-library';
const DB_VERSION = 1;
const STORE_META = 'video-meta';     // ytId, title, thumb (base64), duration, size, addedAt
const STORE_RESUME = 'resume';       // fileKey → { timestamp, duration }

let _db       = null;
let _dirHandle = null;
let _videos   = [];   // { handle, meta }
let _currentHandle = null;
let _currentKey    = null;

// ── IndexedDB ────────────────────────────────────────────────────
function openDB() {
  return new Promise((res, rej) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = e => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains(STORE_META))   db.createObjectStore(STORE_META,   { keyPath: 'fileKey' });
      if (!db.objectStoreNames.contains(STORE_RESUME)) db.createObjectStore(STORE_RESUME, { keyPath: 'fileKey' });
    };
    req.onsuccess = e => res(e.target.result);
    req.onerror   = e => rej(e.target.error);
  });
}

function dbGet(store, key) {
  return new Promise((res, rej) => {
    const tx  = _db.transaction(store, 'readonly');
    const req = tx.objectStore(store).get(key);
    req.onsuccess = e => res(e.target.result);
    req.onerror   = e => rej(e.target.error);
  });
}

function dbPut(store, val) {
  return new Promise((res, rej) => {
    const tx  = _db.transaction(store, 'readwrite');
    const req = tx.objectStore(store).put(val);
    req.onsuccess = e => res(e.target.result);
    req.onerror   = e => rej(e.target.error);
  });
}

function dbGetAll(store) {
  return new Promise((res, rej) => {
    const tx  = _db.transaction(store, 'readonly');
    const req = tx.objectStore(store).getAll();
    req.onsuccess = e => res(e.target.result);
    req.onerror   = e => rej(e.target.error);
  });
}

// ── File System Access ───────────────────────────────────────────
async function selectFolder() {
  if (!('showDirectoryPicker' in window)) {
    alert('Your browser does not support folder access. Please use Chrome.');
    return;
  }
  try {
    _dirHandle = await window.showDirectoryPicker({ mode: 'read' });
    localStorage.setItem('astube_lib_folder', _dirHandle.name);
    await scanFolder();
  } catch(e) {
    if (e.name !== 'AbortError') console.error(e);
  }
}

async function restoreFolder() {
  // Try to restore previously granted handle via persistence
  // File System Access handles don't persist across sessions natively on Android
  // But we can prompt user once per session
  const savedName = localStorage.getItem('astube_lib_folder');
  if (savedName) {
    // Show folder bar with saved name, ask user to re-grant
    showFolderBar(savedName);
    // Auto-prompt to re-grant on load
    try {
      _dirHandle = await window.showDirectoryPicker({ mode: 'read' });
      localStorage.setItem('astube_lib_folder', _dirHandle.name);
      await scanFolder();
    } catch(e) {
      // User dismissed — show cached data from IndexedDB
      await showCachedVideos();
    }
  } else {
    showEmpty();
  }
}

async function scanFolder() {
  if (!_dirHandle) return;
  showFolderBar(_dirHandle.name);
  showScanProgress(true);

  const videoExts = ['mp4', 'mkv', 'webm', 'avi', '3gp', 'mov', 'm4v'];
  const files = [];

  try {
    for await (const [name, handle] of _dirHandle.entries()) {
      if (handle.kind !== 'file') continue;
      const ext = name.split('.').pop().toLowerCase();
      if (!videoExts.includes(ext)) continue;
      files.push({ name, handle });
    }
  } catch(e) {
    console.error('Scan error:', e);
    showScanProgress(false);
    return;
  }

  showScanProgress(false, `Found ${files.length} video${files.length !== 1 ? 's' : ''}`);

  if (files.length === 0) {
    showStats(0);
    renderGrid([]);
    return;
  }

  // Load metadata for each file
  _videos = [];
  for (const f of files) {
    const fileKey = `${_dirHandle.name}::${f.name}`;
    let meta = await dbGet(STORE_META, fileKey);
    if (!meta) {
      // Generate from file
      meta = await buildMeta(f.handle, f.name, fileKey);
      if (meta) await dbPut(STORE_META, meta);
    }
    if (meta) {
      const resume = await dbGet(STORE_RESUME, fileKey);
      _videos.push({ handle: f.handle, meta, resume });
    }
  }

  // Sort by addedAt descending
  _videos.sort((a, b) => (b.meta.addedAt || 0) - (a.meta.addedAt || 0));
  showStats(_videos.length);
  renderGrid(_videos);
}

async function buildMeta(handle, name, fileKey) {
  try {
    const file = await handle.getFile();
    const url  = URL.createObjectURL(file);

    // Get duration via hidden video element
    const duration = await getVideoDuration(url);
    URL.revokeObjectURL(url);

    // Try to match with saved download info (ytId stored at download time)
    const dlInfo = getDownloadInfo(name, file.size);

    return {
      fileKey,
      name,
      size:     file.size,
      addedAt:  file.lastModified || Date.now(),
      duration,
      ytId:     dlInfo?.ytId    || null,
      title:    dlInfo?.title   || null,
      thumb:    dlInfo?.thumb   || null,  // base64
    };
  } catch(e) {
    return null;
  }
}

function getVideoDuration(url) {
  return new Promise(res => {
    const v = document.createElement('video');
    v.preload = 'metadata';
    v.onloadedmetadata = () => { res(v.duration); URL.revokeObjectURL(v.src); };
    v.onerror = () => res(0);
    v.src = url;
    setTimeout(() => res(0), 5000);
  });
}

// Match downloaded video by checking localStorage download log
function getDownloadInfo(filename, size) {
  try {
    const log = JSON.parse(localStorage.getItem('astube_dl_log') || '[]');
    // Match by size (most reliable since filename is always "videoplayback")
    return log.find(d => Math.abs(d.size - size) < 1024 * 100) || null;
  } catch(e) { return null; }
}

async function showCachedVideos() {
  const allMeta = await dbGetAll(STORE_META);
  if (allMeta.length === 0) { showEmpty(); return; }
  _videos = await Promise.all(allMeta.map(async meta => {
    const resume = await dbGet(STORE_RESUME, meta.fileKey);
    return { handle: null, meta, resume };
  }));
  _videos.sort((a, b) => (b.meta.addedAt || 0) - (a.meta.addedAt || 0));
  showStats(_videos.length);
  renderGrid(_videos);
}

// ── Render ───────────────────────────────────────────────────────
function renderGrid(videos) {
  const grid = document.getElementById('lib-grid');
  if (videos.length === 0) {
    grid.innerHTML = '';
    if (_dirHandle) {
      grid.innerHTML = `
        <div style="grid-column:1/-1;text-align:center;padding:40px 16px;color:var(--text3)">
          <i class="fas fa-video-slash" style="font-size:32px;margin-bottom:12px;display:block"></i>
          No videos found in this folder
        </div>`;
    }
    return;
  }

  grid.innerHTML = videos.map((v, i) => {
    const m       = v.meta;
    const resume  = v.resume;
    const thumb   = m.thumb
      ? `<img class="lib-thumb" src="${m.thumb}" alt="" loading="lazy"/>`
      : (m.ytId
          ? `<img class="lib-thumb" src="https://i.ytimg.com/vi/${m.ytId}/hqdefault.jpg" alt="" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"/><div class="lib-thumb-placeholder" style="display:none"><i class="fas fa-film"></i></div>`
          : `<div class="lib-thumb-placeholder"><i class="fas fa-film"></i></div>`);
    const dur     = m.duration ? formatDur(m.duration) : '';
    const title   = m.title || 'Downloaded Video';
    const size    = formatSize(m.size);
    const date    = formatDate(m.addedAt);
    const pct     = (resume && m.duration) ? (resume.timestamp / m.duration * 100).toFixed(1) : 0;
    const hasResume = resume && resume.timestamp > 5 && pct < 95;

    return `
    <div class="lib-card" onclick="playVideo(${i})">
      <div class="lib-thumb-wrap">
        ${thumb}
        ${dur ? `<div class="lib-duration">${dur}</div>` : ''}
        ${hasResume ? `<div class="lib-resume-badge">Resume</div>` : ''}
        ${hasResume ? `<div class="lib-resume-bar" style="width:${pct}%"></div>` : ''}
        <div class="lib-play-overlay"><div class="lib-play-icon"><i class="fas fa-play"></i></div></div>
      </div>
      <div class="lib-card-info">
        <div class="lib-card-title">${escHtml(title)}</div>
        <div class="lib-card-meta">
          <span>${size}</span>
          <span>·</span>
          <span>${date}</span>
        </div>
      </div>
    </div>`;
  }).join('');
}

// ── Playback ─────────────────────────────────────────────────────
async function playVideo(index) {
  const item = _videos[index];
  if (!item) return;

  // Need handle to play
  if (!item.handle) {
    // Cached only — re-request file
    showToast('Please select the folder again to play', 'info');
    await selectFolder();
    return;
  }

  const file = await item.handle.getFile();
  const url  = URL.createObjectURL(file);

  _currentHandle = item.handle;
  _currentKey    = item.meta.fileKey;

  const vid   = document.getElementById('local-video');
  const title = item.meta.title || 'Downloaded Video';

  document.getElementById('lp-title').textContent = title;
  vid.src = url;

  // Restore resume position
  const resume = item.resume;
  if (resume && resume.timestamp > 5) {
    vid.currentTime = resume.timestamp;
  }

  // Open overlay
  document.getElementById('local-player-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';

  vid.play().catch(() => {});
  setupVideoEvents(vid);
}

function setupVideoEvents(vid) {
  const fill     = document.getElementById('lp-fill');
  const seek     = document.getElementById('lp-seek');
  const current  = document.getElementById('lp-current');
  const duration = document.getElementById('lp-duration');
  const playIcon = document.getElementById('lp-play-icon');

  vid.ontimeupdate = () => {
    if (!vid.duration) return;
    const pct = (vid.currentTime / vid.duration) * 100;
    fill.style.width = pct + '%';
    seek.value       = pct;
    current.textContent  = formatDur(vid.currentTime);
    duration.textContent = formatDur(vid.duration);

    // Save resume every 5 seconds
    if (Math.floor(vid.currentTime) % 5 === 0 && _currentKey) {
      saveResume(_currentKey, vid.currentTime, vid.duration);
    }
  };

  vid.onplay  = () => { playIcon.className = 'fas fa-pause'; };
  vid.onpause = () => { playIcon.className = 'fas fa-play'; };
  vid.onended = () => {
    playIcon.className = 'fas fa-rotate-left';
    if (_currentKey) saveResume(_currentKey, 0, vid.duration); // reset
  };

  seek.oninput = () => {
    if (vid.duration) vid.currentTime = (seek.value / 100) * vid.duration;
  };
}

function toggleLocalPlay() {
  const vid = document.getElementById('local-video');
  vid.paused ? vid.play() : vid.pause();
}

function seekRelative(secs) {
  const vid = document.getElementById('local-video');
  vid.currentTime = Math.max(0, Math.min(vid.duration || 0, vid.currentTime + secs));
}

function closeLocalPlayer() {
  const vid     = document.getElementById('local-video');
  const overlay = document.getElementById('local-player-overlay');

  // Save resume before closing
  if (_currentKey && vid.currentTime > 5) {
    saveResume(_currentKey, vid.currentTime, vid.duration);
  }

  vid.pause();
  URL.revokeObjectURL(vid.src);
  vid.src = '';
  overlay.classList.remove('open');
  document.body.style.overflow = '';

  // Refresh grid to update resume bars
  renderGrid(_videos.map(v => {
    if (v.meta.fileKey === _currentKey && vid.currentTime > 5) {
      return { ...v, resume: { fileKey: _currentKey, timestamp: vid.currentTime, duration: vid.duration } };
    }
    return v;
  }));

  _currentKey = null;
  _currentHandle = null;
}

async function saveResume(fileKey, timestamp, duration) {
  if (!_db) return;
  try {
    await dbPut(STORE_RESUME, { fileKey, timestamp, duration });
  } catch(e) {}
}

// ── UI helpers ───────────────────────────────────────────────────
function showEmpty() {
  const grid = document.getElementById('lib-grid');
  grid.innerHTML = `
    <div class="lib-empty" style="grid-column:1/-1">
      <div class="lib-empty-icon"><i class="fas fa-folder-open"></i></div>
      <h3>No folder selected</h3>
      <p>Grant access to your Downloads folder to see and play your downloaded videos — even offline.</p>
      <button class="lib-select-btn" onclick="selectFolder()">
        <i class="fas fa-folder-open"></i> Select Downloads Folder
      </button>
    </div>`;
}

function showFolderBar(name) {
  document.getElementById('folder-bar').style.display = 'flex';
  document.getElementById('folder-name').textContent  = name;
}

function showScanProgress(show, text) {
  const el = document.getElementById('scan-progress');
  el.style.display = show ? 'flex' : 'none';
  if (text) document.getElementById('scan-text').textContent = text;
}

function showStats(count) {
  const el = document.getElementById('lib-stats');
  el.style.display = count > 0 ? 'block' : 'none';
  el.textContent   = `${count} video${count !== 1 ? 's' : ''}`;
}

function showSkeletons(n = 6) {
  const grid = document.getElementById('lib-grid');
  grid.innerHTML = Array(n).fill(`
    <div class="lib-skeleton">
      <div class="lib-skeleton-thumb"></div>
      <div class="lib-skeleton-lines">
        <div class="lib-skeleton-line"></div>
        <div class="lib-skeleton-line short"></div>
      </div>
    </div>`).join('');
}

function formatDur(secs) {
  if (!secs || isNaN(secs)) return '';
  const h = Math.floor(secs / 3600);
  const m = Math.floor((secs % 3600) / 60);
  const s = Math.floor(secs % 60);
  if (h > 0) return `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  return `${m}:${String(s).padStart(2,'0')}`;
}

function formatSize(bytes) {
  if (!bytes) return '';
  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(0) + ' KB';
  return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
}

function formatDate(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

async function refreshLibrary() {
  if (!_dirHandle) { await selectFolder(); return; }
  showSkeletons();
  await scanFolder();
}

async function changeFolder() {
  await selectFolder();
}

// ── Android Bridge ────────────────────────────────────────────────
async function loadFromAndroid() {
  const grid = document.getElementById('lib-grid');
  showSkeletons(4);
  try {
    const raw = window.ASTUBEAndroid.listVideos();
    const files = JSON.parse(raw);
    if (files.length === 0) {
      showEmpty();
      return;
    }
    const dlLog = JSON.parse(localStorage.getItem('astube_dl_log') || '[]');
    const cards = files.map(f => {
      const match = dlLog.find(d => f.name.includes(d.ytId) || (d.title && f.name.includes(d.title.substring(0,10))));
      return {
        name: match ? match.title : f.name,
        ytId: match ? match.ytId : null,
        thumb: match ? match.thumb : null,
        size: f.size,
        lastModified: f.lastModified,
        uri: f.uri,
        path: f.path
      };
    });
    const folderBar = document.getElementById('folder-bar');
    const folderName = document.getElementById('folder-name');
    if (folderBar) { folderBar.style.display='flex'; }
    if (folderName) { folderName.textContent = window.ASTUBEAndroid.getDownloadsPath(); }
    _videos = cards;
    renderGrid(cards);
  } catch(e) {
    console.error('Android bridge error', e);
    showEmpty();
  }
}

// ── Init ─────────────────────────────────────────────────────────
async function init() {
  _db = await openDB();

  // Use Android native bridge if available
  if (window.ASTUBEAndroid) {
    await loadFromAndroid();
    return;
  }

  // Check File System Access API support
  if (!('showDirectoryPicker' in window)) {
    const grid = document.getElementById('lib-grid');
    grid.innerHTML = `
      <div class="lib-empty" style="grid-column:1/-1">
        <div class="lib-empty-icon"><i class="fas fa-exclamation-triangle"></i></div>
        <h3>Not supported</h3>
        <p>Please open ASTUBE in Chrome to use the Library feature.</p>
      </div>`;
    return;
  }

  showSkeletons(4);
  await restoreFolder();
}

// Auth UI
auth.onAuthStateChanged(user => {
  const signInBtn = document.getElementById('sign-in-btn');
  const avatar    = document.getElementById('user-avatar');
  if (user) {
    signInBtn.style.display = 'none';
    avatar.style.display    = 'flex';
    const name = user.displayName || user.email || 'U';
    if (user.photoURL) {
      avatar.innerHTML = `<img src="${user.photoURL}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`;
    } else {
      avatar.textContent = name[0].toUpperCase();
    }
  } else {
    signInBtn.style.display = 'flex';
    avatar.style.display    = 'none';
  }
});

restoreBackendFromCache();
_verifyBackendInBackground();
init();
