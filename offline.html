<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Offline — ASTUBE</title>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<meta name="theme-color" content="#00c851"/>
<link rel="icon" type="image/png" href="icon.png"/>
<link rel="manifest" href="manifest.json"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{
    background:#0a0a0a;color:#e8e8e8;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:24px;text-align:center;
  }
  .logo{font-size:26px;font-weight:900;letter-spacing:-.5px;color:#e8e8e8;margin-bottom:32px;text-decoration:none}
  .logo span{color:#00c851}
  .icon-wrap{
    width:88px;height:88px;border-radius:24px;
    background:rgba(0,200,81,.1);border:1px solid rgba(0,200,81,.25);
    display:flex;align-items:center;justify-content:center;
    font-size:36px;color:#00c851;margin:0 auto 24px;
  }
  h1{font-size:22px;font-weight:800;margin-bottom:8px}
  p{font-size:14px;color:#888;line-height:1.6;max-width:320px;margin:0 auto 28px}
  .btn{
    display:inline-flex;align-items:center;gap:8px;
    background:#00c851;color:#000;border:none;
    font-size:14px;font-weight:700;padding:12px 24px;
    border-radius:24px;cursor:pointer;text-decoration:none;
    transition:opacity .2s;
  }
  .btn:hover{opacity:.88}
  .tip{font-size:12px;color:#555;margin-top:20px;line-height:1.7}
  .tip i{color:#00c851;margin-right:4px}
</style>
</head>
<body>
  <a href="index.html" class="logo">AS<span>TUBE</span></a>
  <div class="icon-wrap"><i class="fas fa-wifi-slash"></i></div>
  <h1>You're Offline</h1>
  <p>No internet connection. Check your Wi-Fi or mobile data and try again.</p>
  <a href="index.html" class="btn"><i class="fas fa-rotate-right"></i> Try Again</a>
  <p class="tip">
    <i class="fas fa-circle-check"></i>Previously visited pages may still be available<br>
    <i class="fas fa-circle-check"></i>Your account stays signed in while offline
  </p>
</body>
</html>
